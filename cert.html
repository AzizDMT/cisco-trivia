<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DealMyTime Certificate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root{ --cisco-blue:#1BA0D7; --cisco-dark:#0D274D; --cisco-navy:#07182E; --yellow:#FFD200; --muted:#9FB6CE; }
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Helvetica Neue",Arial,sans-serif}
  body{min-height:100vh;color:#fff;
    background:radial-gradient(circle at 50% 0%,var(--cisco-dark),var(--cisco-navy) 70%);
    display:flex;flex-direction:column;align-items:center;padding:20px}
  h1{font-size:22px;letter-spacing:.03em;margin-bottom:4px;text-align:center}
  h1 .logo{color:var(--cisco-blue);font-weight:800}
  h1 .title{color:var(--yellow);font-weight:800}
  .sub{color:var(--muted);font-size:14px;margin-bottom:16px;text-align:center}
  .card{width:100%;max-width:760px;background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px}
  #certCanvas{width:100%;height:auto;aspect-ratio:1448/1086;border-radius:10px;background:#fff;display:block}
  label{display:block;font-size:13px;color:var(--muted);margin:14px 0 4px}
  input{width:100%;padding:12px;border-radius:9px;border:1px solid rgba(255,255,255,.18);
    background:rgba(255,255,255,.07);color:#fff;font-size:16px}
  button{cursor:pointer;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:800;margin-top:14px;width:100%}
  .gold{background:var(--yellow);color:var(--cisco-navy)}
  .ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.25)}
  .hint{font-size:12px;color:var(--muted);margin-top:10px;text-align:center;line-height:1.5}
</style>
</head>
<body>
  <h1><span class="logo">CISCO</span> <span class="title">DealMyTime</span> — Your Certificate</h1>
  <div class="sub">Tap Download to save your Certificate of Participation.</div>

  <div class="card">
    <canvas id="certCanvas" width="1448" height="1086"></canvas>
    <label>Name on certificate</label>
    <input id="nameInput" placeholder="Your name" maxlength="28" />
    <button id="downloadBtn" class="gold">Download certificate</button>
    <button id="linkedinBtn" class="ghost">Share on LinkedIn</button>
    <div class="hint">Pre-filled from your quiz. Edit the name above if needed, then download.</div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  const p = new URLSearchParams(location.search);
  $('nameInput').value = p.get('name') || '';

  // overlay geometry (fractions of template W/H), measured from the template
  const TPL = {
    seal: { cx: 0.165, cy: 0.488, r: 0.118, color: '#FDFCFB' },          // fully erases the photo medallion
    name: { cx: 0.538, cy: 0.490, maxW: 0.40, size: 0.125 },             // script name
    cover:{ x: 0.351, y: 0.420, w: 0.373, h: 0.141, color: '#FDFCFB' },  // hides baked "Your Name"
  };

  let bgReady = false, fontReady = false;
  const bg = new Image();
  bg.onload = () => { bgReady = true; buildCertificate(); };
  bg.src = 'certificate-bg.png';

  if (document.fonts && document.fonts.load) {
    document.fonts.load('100px "Great Vibes"').then(() => { fontReady = true; buildCertificate(); }).catch(() => { fontReady = true; });
  } else { fontReady = true; }

  function buildCertificate(){
    if(!bgReady) return;
    const cv=$('certCanvas'), g=cv.getContext('2d'), W=cv.width, H=cv.height;
    g.clearRect(0,0,W,H);
    g.drawImage(bg, 0, 0, W, H);

    // clean the photo medallion (no photo in this flow)
    g.fillStyle=TPL.seal.color;
    g.beginPath(); g.arc(TPL.seal.cx*W, TPL.seal.cy*H, TPL.seal.r*W, 0, Math.PI*2); g.fill();

    // name: cover baked "Your Name", then draw the real name in script
    const name=($('nameInput').value||'').trim();
    if(name){
      g.fillStyle=TPL.cover.color;
      g.fillRect(TPL.cover.x*W, TPL.cover.y*H, TPL.cover.w*W, TPL.cover.h*H);

      const cx=TPL.name.cx*W;
      let size=TPL.name.size*H;
      const fam = fontReady ? '"Great Vibes", cursive' : 'cursive';
      g.textAlign='center'; g.textBaseline='middle';
      g.font=`${size}px ${fam}`;
      let tw=g.measureText(name).width;
      const maxW=TPL.name.maxW*W;
      if(tw>maxW){ size*=maxW/tw; g.font=`${size}px ${fam}`; tw=g.measureText(name).width; }

      const grad=g.createLinearGradient(cx-tw/2,0,cx+tw/2,0);
      grad.addColorStop(0,'#6A2C9A'); grad.addColorStop(1,'#2A4DD0');
      g.fillStyle=grad;
      g.fillText(name, cx, TPL.name.cy*H);
    }
  }
  $('nameInput').addEventListener('input', buildCertificate);

  $('downloadBtn').addEventListener('click', ()=>{
    const name=($('nameInput').value||'certificate').trim().replace(/\s+/g,'_');
    $('certCanvas').toBlob(b=>{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(b); a.download=`DealMyTime_${name}.png`; a.click();
      URL.revokeObjectURL(a.href);
    },'image/png');
  });

  $('linkedinBtn').addEventListener('click', ()=>window.open('https://www.linkedin.com/feed/?shareActive=true','_blank'));
</script>
</body>
</html>
