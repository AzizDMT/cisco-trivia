<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>DealMyTime Quiz</title>
<script src="qrcode.js"></script>
<style>
  :root {
    --cisco-blue:   #1BA0D7;
    --cisco-dark:   #0D274D;
    --cisco-navy:   #07182E;
    --yellow:       #FFD200;
    --green:        #2ECC71;
    --red:          #E74C3C;
    --ink:          #FFFFFF;
    --muted:        #9FB6CE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background: radial-gradient(circle at 50% 0%, var(--cisco-dark), var(--cisco-navy) 70%);
    display: flex; flex-direction: column;
    height: 100vh; overflow: hidden;
    padding: 3.5vh 5vw;
  }
  .brand {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 2.4vh; letter-spacing: .15em; text-transform: uppercase;
  }
  .brand .logo  { color: var(--cisco-blue); font-weight: 800; letter-spacing: .12em; }
  .brand .title { color: var(--yellow);     font-weight: 800; letter-spacing: .08em; }
  .brand .right { color: var(--muted); font-size: 2vh; letter-spacing: .25em; }

  .status { margin-top: .8vh; font-size: 2.5vh; color: var(--muted); font-weight: 600; }
  .timerbar {
    height: 1vh; width: 100%; background: rgba(255,255,255,.08);
    border-radius: 1vh; overflow: hidden; margin-top: 1.2vh;
  }
  .timerbar > span {
    display: block; height: 100%; width: 100%;
    background: linear-gradient(90deg, var(--cisco-blue), #6FD3F2);
    transform-origin: left center;
  }
  .question { flex: 0 0 auto; margin: 2.6vh 0 2.4vh; font-size: 4.4vh; font-weight: 700; line-height: 1.15; }

  /* single column, 4 options, aligned top-to-bottom with the Navigator */
  .options { display: flex; flex-direction: column; gap: 1.6vh; flex: 1 1 auto; justify-content: center; }
  .opt {
    display: flex; align-items: center; gap: 2vh;
    background: rgba(255,255,255,.06); border: 2px solid rgba(255,255,255,.08);
    border-radius: 1.6vh; padding: 1.8vh 2.8vh; font-size: 2.9vh; font-weight: 600; line-height: 1.2;
    transition: background .25s, border-color .25s, transform .25s;
  }
  .opt .letter {
    flex: 0 0 auto; width: 5.6vh; height: 5.6vh; border-radius: 50%;
    background: var(--cisco-blue); color: var(--cisco-navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 3vh; font-weight: 800;
  }
  .opt.correct { background: rgba(46,204,113,.22); border-color: var(--green); transform: scale(1.015); }
  .opt.correct .letter { background: var(--green); color: #06281A; }
  .opt.wrong   { background: rgba(231,76,60,.18); border-color: var(--red); }
  .opt.wrong .letter { background: var(--red); }

  .center {
    flex: 1 1 auto; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; gap: 2.2vh;
  }
  .big   { font-size: 7.5vh; font-weight: 800; }
  .huge  { font-size: 11vh;  font-weight: 800; color: var(--yellow); line-height: 1; }
  .sub   { font-size: 3.4vh; color: var(--muted); font-weight: 600; }

  .resrow { display: flex; gap: 5vw; align-items: center; justify-content: center; width: 100%; margin-top: 1vh; }
  .board { flex: 0 1 auto; min-width: 38vw; }
  .board h3 { font-size: 2.6vh; color: var(--yellow); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 1.2vh; }
  .board .row {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 2.8vh; padding: 1vh 2vh; border-radius: 1.2vh;
    background: rgba(255,255,255,.05); margin-bottom: .9vh;
  }
  .board .row.me { background: rgba(255,210,0,.16); border: 1px solid var(--yellow); }
  .board .row .rank { color: var(--muted); width: 4vh; }
  .board .row .name { flex: 1 1 auto; text-align: left; padding-left: 1.5vh; font-weight: 700; }
  .board .row .pts  { color: var(--cisco-blue); font-weight: 800; }

  .qr { display: flex; flex-direction: column; align-items: center; gap: 1.4vh; }
  .qr .box { background: #fff; padding: 1.6vh; border-radius: 1.6vh; line-height: 0; }
  .qr img { display: block; width: 30vh; height: 30vh; image-rendering: pixelated; }
  .qrcap { font-size: 2.4vh; color: var(--yellow); font-weight: 700; max-width: 26vw; text-align: center; line-height: 1.3; }

  .hidden { display: none !important; }
  @keyframes drain { from { transform: scaleX(1); } to { transform: scaleX(0); } }
</style>
</head>
<body>
  <div class="brand">
    <span><span class="logo">CISCO</span> <span class="title">DealMyTime</span></span>
    <span class="right">booth edition</span>
  </div>

  <!-- QUESTION VIEW -->
  <div id="questionView" class="hidden">
    <div class="status" id="status">Question 1/5</div>
    <div class="timerbar"><span id="timerFill"></span></div>
    <div class="question" id="question">Question text</div>
    <div class="options">
      <div class="opt" data-key="a"><span class="letter">A</span><span class="txt" id="oa"></span></div>
      <div class="opt" data-key="b"><span class="letter">B</span><span class="txt" id="ob"></span></div>
      <div class="opt" data-key="c"><span class="letter">C</span><span class="txt" id="oc"></span></div>
      <div class="opt" data-key="d"><span class="letter">D</span><span class="txt" id="od"></span></div>
    </div>
  </div>

  <!-- START / RESULTS VIEW -->
  <div id="centerView" class="center hidden">
    <div class="big"  id="centerBig">DealMyTime QUIZ</div>
    <div class="huge hidden" id="centerHuge"></div>
    <div class="sub"  id="centerSub">Enter your name on the Navigator to play</div>
    <div class="resrow hidden" id="resrow">
      <div class="board" id="board"><h3>Leaderboard</h3><div id="boardRows"></div></div>
      <div class="qr" id="qrWrap">
        <div class="box"><img id="qrImg" alt="certificate QR"></div>
        <div class="qrcap">Scan for your certificate<br>name pre-filled</div>
      </div>
    </div>
  </div>

<script>
  const p = new URLSearchParams(location.search);
  const get = (k, d = '') => p.get(k) ?? d;
  const mode = get('mode', 'start');

  const questionView = document.getElementById('questionView');
  const centerView   = document.getElementById('centerView');
  const showQuestion = (v) => {
    questionView.classList.toggle('hidden', !v);
    centerView.classList.toggle('hidden', v);
  };

  if (mode === 'question' || mode === 'reveal') {
    showQuestion(true);
    const name = get('name');
    const head = (name ? name + '   •   ' : '') +
                 `Question ${get('n','1')}/${get('total','5')}   •   Score ${get('score','0')}`;
    document.getElementById('status').textContent = head;
    document.getElementById('question').textContent = get('q');
    document.getElementById('oa').textContent = get('oa');
    document.getElementById('ob').textContent = get('ob');
    document.getElementById('oc').textContent = get('oc');
    document.getElementById('od').textContent = get('od');

    const fill = document.getElementById('timerFill');
    if (mode === 'question') {
      const t = parseInt(get('t', '0'), 10);
      if (t > 0) fill.style.animation = `drain ${t}s linear forwards`;
      else fill.style.transform = 'scaleX(1)';
    } else {
      fill.style.transform = 'scaleX(0)';
      const correct = get('correct'), chosen = get('chosen');
      document.querySelectorAll('.opt').forEach(el => {
        const k = el.dataset.key;
        if (k === correct) el.classList.add('correct');
        else if (k === chosen && chosen !== 'none') el.classList.add('wrong');
      });
    }
  } else if (mode === 'results') {
    showQuestion(false);
    const name = get('name', 'Player');
    const score = parseInt(get('score','0'),10);
    const total = Math.max(1, parseInt(get('total','5'),10));
    document.getElementById('centerBig').textContent = 'Round Complete';
    const huge = document.getElementById('centerHuge');
    huge.classList.remove('hidden');
    huge.textContent = `${score} / ${total}`;
    const pct = Math.round((score / total) * 100);
    let verdict = 'Nice try - play again to climb the board';
    if (pct === 100)    verdict = 'Flawless - networking legend';
    else if (pct >= 75) verdict = 'Sharp - Cisco-certified vibes';
    else if (pct >= 50) verdict = 'Solid effort';
    document.getElementById('centerSub').textContent = `${name} - ${verdict}`;

    const lbRaw = get('lb');
    if (lbRaw) {
      const rows = lbRaw.split('|').filter(Boolean).map(e => {
        const [n, s, t] = e.split('~');
        return { n, s: parseInt(s, 10), t: parseInt(t, 10) };
      });
      document.getElementById('boardRows').innerHTML = rows.map((r, i) => {
        const me = (r.n === name && r.s === score && r.t === total) ? ' me' : '';
        return `<div class="row${me}"><span class="rank">${i + 1}</span>` +
               `<span class="name">${escapeHtml(r.n)}</span>` +
               `<span class="pts">${r.s}/${r.t}</span></div>`;
      }).join('');
    }
    renderCertQR(name, score, total);
    document.getElementById('resrow').classList.remove('hidden');
  } else {
    showQuestion(false);
    document.getElementById('centerBig').textContent = 'DealMyTime QUIZ';
    document.getElementById('centerHuge').classList.add('hidden');
    document.getElementById('centerSub').textContent = 'Enter your name on the Navigator to play';
    document.getElementById('resrow').classList.add('hidden');
  }

  function renderCertQR(name, score, total) {
    const base = location.href.split('?')[0].replace(/[^/]*$/, '');
    const certUrl = `${base}cert.html?name=${encodeURIComponent(name)}&score=${score}&total=${total}`;
    const img = document.getElementById('qrImg');
    try {
      const qr = qrcode(0, 'M');
      qr.addData(certUrl);
      qr.make();
      img.src = qr.createDataURL(8, 16);
    } catch (e) { img.alt = 'QR could not be generated'; }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
</script>
</body>
</html>
