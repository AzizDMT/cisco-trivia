<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cisco Trivia</title>
<style>
  :root {
    --cisco-blue:   #1BA0D7;
    --cisco-dark:   #0D274D;
    --cisco-navy:   #07182E;
    --green:        #2ECC71;
    --red:          #E74C3C;
    --ink:          #FFFFFF;
    --muted:        #9FB6CE;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background: radial-gradient(circle at 50% 0%, var(--cisco-dark), var(--cisco-navy) 70%);
    display: flex; flex-direction: column;
    height: 100vh; overflow: hidden;
    padding: 4vh 6vw;
  }
  .brand {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 2.2vh; letter-spacing: .3em; color: var(--muted);
    text-transform: uppercase;
  }
  .brand .logo { color: var(--cisco-blue); font-weight: 700; letter-spacing: .15em; }
  .status {
    margin-top: 1vh; font-size: 2.6vh; color: var(--muted); font-weight: 600;
  }
  .timerbar {
    height: 1.1vh; width: 100%; background: rgba(255,255,255,.08);
    border-radius: 1vh; overflow: hidden; margin-top: 1.4vh;
  }
  .timerbar > span {
    display: block; height: 100%; width: 100%;
    background: linear-gradient(90deg, var(--cisco-blue), #6FD3F2);
    transform-origin: left center;
  }
  .question {
    flex: 0 0 auto; margin: 4vh 0 3vh;
    font-size: 5.2vh; font-weight: 700; line-height: 1.15;
  }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 2.2vh; flex: 1 1 auto; }
  .opt {
    display: flex; align-items: center; gap: 2vh;
    background: rgba(255,255,255,.06); border: 2px solid rgba(255,255,255,.08);
    border-radius: 2vh; padding: 2.4vh 3vh; font-size: 3.4vh; font-weight: 600;
    transition: background .25s, border-color .25s, transform .25s;
  }
  .opt .letter {
    flex: 0 0 auto; width: 6.5vh; height: 6.5vh; border-radius: 50%;
    background: var(--cisco-blue); color: var(--cisco-navy);
    display: flex; align-items: center; justify-content: center;
    font-size: 3.4vh; font-weight: 800;
  }
  .opt.correct { background: rgba(46,204,113,.22); border-color: var(--green); transform: scale(1.02); }
  .opt.correct .letter { background: var(--green); color: #06281A; }
  .opt.wrong   { background: rgba(231,76,60,.18); border-color: var(--red); }
  .opt.wrong .letter { background: var(--red); }

  .center {
    flex: 1 1 auto; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; gap: 3vh;
  }
  .big   { font-size: 9vh; font-weight: 800; }
  .huge  { font-size: 16vh; font-weight: 800; color: var(--cisco-blue); }
  .sub   { font-size: 4vh; color: var(--muted); font-weight: 600; }
  .pill  {
    display: inline-block; margin-top: 1vh; padding: 1.6vh 4vh;
    background: var(--cisco-blue); color: var(--cisco-navy);
    border-radius: 6vh; font-size: 3vh; font-weight: 800;
  }
  .qr-note { font-size: 3vh; color: var(--ink); opacity: .9; }
  .hidden { display: none !important; }

  @keyframes drain { from { transform: scaleX(1); } to { transform: scaleX(0); } }
</style>
</head>
<body>
  <div class="brand">
    <span><span class="logo">CISCO</span> &nbsp;PARTNER&nbsp;TRIVIA</span>
    <span id="brandRight">booth&nbsp;edition</span>
  </div>

  <!-- QUESTION VIEW -->
  <div id="questionView" class="hidden">
    <div class="status" id="status">Question 1/8 • Score 0</div>
    <div class="timerbar"><span id="timerFill"></span></div>
    <div class="question" id="question">Question text…</div>
    <div class="options">
      <div class="opt" data-key="a"><span class="letter">A</span><span class="txt" id="oa"></span></div>
      <div class="opt" data-key="b"><span class="letter">B</span><span class="txt" id="ob"></span></div>
      <div class="opt" data-key="c"><span class="letter">C</span><span class="txt" id="oc"></span></div>
      <div class="opt" data-key="d"><span class="letter">D</span><span class="txt" id="od"></span></div>
    </div>
  </div>

  <!-- START / RESULTS VIEW -->
  <div id="centerView" class="center hidden">
    <div class="big"   id="centerBig">🧠 Cisco Trivia</div>
    <div class="huge hidden" id="centerHuge"></div>
    <div class="sub"   id="centerSub">Tap “Start ▶” on the Navigator to play!</div>
    <div class="qr-note hidden" id="qrNote">📲 Scan the booth QR to claim your score &amp; enter the raffle!</div>
  </div>

<script>
  // ---- read state from the URL query string -------------------------------
  const p = new URLSearchParams(location.search);
  const get = (k, d = '') => p.get(k) ?? d;
  const mode = get('mode', 'start');

  const questionView = document.getElementById('questionView');
  const centerView   = document.getElementById('centerView');

  function show(view) {
    questionView.classList.toggle('hidden', view !== 'question');
    centerView.classList.toggle('hidden', view === 'question');
  }

  if (mode === 'question' || mode === 'reveal') {
    show('question');
    document.getElementById('status').textContent =
      `Question ${get('n','1')}/${get('total','8')}  •  Score ${get('score','0')}`;
    document.getElementById('question').textContent = get('q');
    document.getElementById('oa').textContent = get('oa');
    document.getElementById('ob').textContent = get('ob');
    document.getElementById('oc').textContent = get('oc');
    document.getElementById('od').textContent = get('od');

    const fill = document.getElementById('timerFill');
    if (mode === 'question') {
      const t = parseInt(get('t', '0'), 10);
      if (t > 0) {
        fill.style.animation = `drain ${t}s linear forwards`;
      } else {
        fill.style.transform = 'scaleX(1)';
      }
    } else {
      // reveal: freeze bar, colour the options
      fill.style.transform = 'scaleX(0)';
      const correct = get('correct');
      const chosen  = get('chosen');
      document.querySelectorAll('.opt').forEach(el => {
        const k = el.dataset.key;
        if (k === correct) el.classList.add('correct');
        else if (k === chosen && chosen !== 'none') el.classList.add('wrong');
      });
    }
  } else if (mode === 'results') {
    show('center');
    document.getElementById('centerBig').textContent = 'Round Complete!';
    const huge = document.getElementById('centerHuge');
    huge.classList.remove('hidden');
    huge.textContent = `${get('score','0')} / ${get('total','8')}`;
    const pct = Math.round((parseInt(get('score','0'),10) / Math.max(1, parseInt(get('total','8'),10))) * 100);
    let verdict = '📚 Time to brush up — play again!';
    if (pct === 100)    verdict = '🏆 Flawless! Networking legend.';
    else if (pct >= 75) verdict = '🌟 Sharp! Cisco-certified vibes.';
    else if (pct >= 50) verdict = '👍 Solid effort.';
    document.getElementById('centerSub').textContent = verdict;
    document.getElementById('qrNote').classList.remove('hidden');
  } else {
    // start / idle
    show('center');
    document.getElementById('centerBig').textContent = '🧠 Cisco Trivia';
    document.getElementById('centerHuge').classList.add('hidden');
    document.getElementById('centerSub').textContent = 'Tap “Start ▶” on the Navigator to play!';
    document.getElementById('qrNote').classList.add('hidden');
  }
</script>
</body>
</html>
